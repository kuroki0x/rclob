apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: rclob

resources:
  - hpa.yaml

patches:
  - target:
      kind: Deployment
      name: rclob
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi

configMapGenerator:
  - name: rclob-config
    behavior: merge
    literals:
      - LOG_LEVEL=warn
      - LOG_FORMAT=json

secretGenerator:
  - name: rclob-secret
    behavior: merge
    literals:
      - REDIS_PASSWORD=<your-redis-password>
