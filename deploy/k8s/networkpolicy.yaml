apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rclob
  namespace: rclob
spec:
  podSelector:
    matchLabels:
      app: rclob
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
